name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-test:
    name: Backend Tests (FastAPI & Pytest)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      working-directory: ./server
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with flake8
      working-directory: ./server
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Test with pytest
      working-directory: ./server
      run: |
        pytest --cov=./ --cov-report=xml

  frontend-test:
    name: Frontend Tests (Next.js & Jest)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        cache: 'npm'
        cache-dependency-path: './web/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./web
      run: npm ci
        
    - name: Run Linter
      working-directory: ./web
      run: npm run lint
        
    - name: Run Jest Tests
      working-directory: ./web
      run: npm test -- --coverage

  docker-build:
    name: Build Docker Images
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build and verify backend image
      run: docker build -t skillsutra-backend:latest ./server
      
    - name: Build and verify frontend image
      run: docker build -t skillsutra-frontend:latest ./web
