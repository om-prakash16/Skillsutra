version: '3.8'
services:
  hiring-tool-db:
    image: postgres:15-alpine
    container_name: hiring_tool_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=skillsutra
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hiring_tool_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: skillsutra_keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://hiring-tool-db:5432/skillsutra
      - KC_DB_USERNAME=postgres
      - KC_DB_PASSWORD=postgres
      - KC_DB_SCHEMA=keycloak
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      - hiring-tool-db
    networks:
      - hiring_tool_network

  hiring-tool-web:
    container_name: hiring_tool_web
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8080
      - NEXT_PUBLIC_KEYCLOAK_REALM=skillsutra
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=skillsutra-web
    depends_on:
      - hiring-tool-server
      - hiring-tool-db
      - keycloak
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - hiring_tool_network

  hiring-tool-server:
    container_name: hiring_tool_server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@hiring-tool-db:5432/skillsutra
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=skillsutra
      - KEYCLOAK_API_CLIENT_ID=skillsutra-api
      - KEYCLOAK_API_CLIENT_SECRET=${KEYCLOAK_API_CLIENT_SECRET:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - hiring-tool-db
      - keycloak
    volumes:
      - ./server:/app
    networks:
      - hiring_tool_network

volumes:
  postgres_data:

networks:
  hiring_tool_network:
    name: hiring_tool_talent_network
