version: '3.8'
services:
  hiring-tool-db:
    image: pgvector/pgvector:pg15
    container_name: hiring_tool_db
    ports:
      - "5433:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hiring_tool_network

  redis:
    image: redis:7-alpine
    container_name: hiring_tool_redis
    ports:
      - "6379:6379"
    networks:
      - hiring_tool_network

  celery-worker:
    container_name: hiring_tool_celery_worker
    build:
      context: .
      dockerfile: server/Dockerfile
    command: celery -A core.celery_app worker -l INFO -Q ai_tasks,background_tasks,default
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - hiring-tool-db
      - redis
    volumes:
      - ./server:/app
    networks:
      - hiring_tool_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: skillsutra_keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      - hiring-tool-db
    networks:
      - hiring_tool_network

  hiring-tool-web:
    container_name: hiring_tool_web
    build:
      context: .
      dockerfile: web/Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - INTERNAL_API_URL=http://hiring-tool-server:8000/api/v1
    depends_on:
      - hiring-tool-server
      - hiring-tool-db
      - keycloak
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - hiring_tool_network

  hiring-tool-server:
    container_name: hiring_tool_server
    build:
      context: .
      dockerfile: server/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - INTERNAL_API_URL=http://hiring-tool-server:8000/api/v1
    depends_on:
      - hiring-tool-db
      - keycloak
      - redis
    volumes:
      - ./server:/app
    networks:
      - hiring_tool_network

  load-balancer:
    image: nginx:latest
    container_name: load_balancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hiring-tool-web
      - hiring-tool-server
    networks:
      - hiring_tool_network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - hiring_tool_network

volumes:
  postgres_data:

networks:
  hiring_tool_network:
    name: hiring_tool_talent_network
