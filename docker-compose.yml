version: '3.8'
services:
  hiring-tool-web:
    container_name: hiring_tool_web
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - hiring-tool-server
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - hiring_tool_network

  hiring-tool-server:
    container_name: hiring_tool_server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./server:/app
    networks:
      - hiring_tool_network

networks:
  hiring_tool_network:
    name: hiring_tool_talent_network
