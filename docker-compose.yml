version: '3.8'
services:
  skillsutra-web:
    container_name: skillsutra_web
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3011:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8011/api/v1
    depends_on:
      - skillsutra-server
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - skillsutra_network

  skillsutra-server:
    container_name: skillsutra_server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8011:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./server:/app
    networks:
      - skillsutra_network

networks:
  skillsutra_network:
    name: skillsutra_talent_network
